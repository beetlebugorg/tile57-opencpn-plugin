name: CI

on:
  push:
    branches: [main]
  pull_request:

# The plugin links libtile57.a (the tile57 engine, built with Zig) and the vendored
# OpenCPN api-18 submodule. macOS is intentionally NOT built here (it needs an
# OpenCPN.app to retarget/re-sign wxWidgets against — see cmake/fix-macos-libs.sh).
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin the exact clang-format so the check matches local formatting byte-for-byte
      # (clang-format output drifts between versions). Only our own src/ — vendored
      # third_party/ and the opencpn-libs submodule are left alone.
      - name: clang-format check
        run: pipx run --spec "clang-format==22.1.8" clang-format --dry-run --Werror src/*.cpp src/*.h

  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Checkout tile57 engine
        uses: actions/checkout@v7
        with:
          repository: beetlebugorg/tile57
          submodules: recursive
          path: tile57

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build tile57 (static lib)
        working-directory: tile57
        # `lib` builds ONLY libtile57.a (what the plugin links); the default step also
        # builds the host-only bake CLI, which can't cross-compile.
        run: zig build lib -Doptimize=ReleaseFast

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libwxgtk3.2-dev \
            libglew-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DTILE57_DIR="${{ github.workspace }}/tile57"

      - name: Build
        run: cmake --build build -j

      - name: Package (OpenCPN import tarball)
        run: cmake --build build --target package

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tile57_pi-linux
          path: build/tile57_pi_*.tar.gz
          if-no-files-found: error

  # Best-effort Windows build. The plugin links the vendored MSVC OpenCPN import lib
  # (opencpn-libs/api-18/msvc-wx32/opencpn.lib), so tile57 must be built for the 32-bit
  # MSVC ABI too, and wxWidgets/GLEW come from OpenCPN's prebuilt cache (win_deps.bat).
  # A failure here does not block the Linux build.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout plugin (with submodules)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Checkout tile57 engine
        uses: actions/checkout@v7
        with:
          repository: beetlebugorg/tile57
          submodules: recursive
          path: tile57

      - name: Set up MSVC environment
        # OpenCPN for Windows is a 32-bit process, so the plugin (and tile57) must be x86.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build tile57 (MSVC-ABI static lib)
        working-directory: tile57
        # `lib` builds ONLY libtile57.a for the MSVC ABI; the default step also builds
        # the host-only bake CLI, which can't cross-compile. x86 = 32-bit, to match OpenCPN.
        run: zig build lib -Dtarget=x86-windows-msvc -Doptimize=ReleaseFast

      - name: Locate tile57 lib
        id: t57lib
        shell: bash
        run: |
          echo "=== tile57/zig-out tree ==="
          find tile57/zig-out -type f 2>/dev/null | sort || echo "(no zig-out)"
          # Search the whole zig-out, not just lib/, in case the archive lands elsewhere.
          lib=$(find tile57/zig-out \( -name '*.lib' -o -name '*.a' \) 2>/dev/null | head -1)
          echo "Found tile57 lib: $lib"
          if [ -z "$lib" ]; then echo "::error::no tile57 static lib produced by zig build lib"; exit 1; fi
          echo "path=$lib" >> "$GITHUB_OUTPUT"

      # wx + GLEW come from OpenCPN's own prebuilt 32-bit (vc14x) cache, not vcpkg:
      # building wxWidgets from source in vcpkg took 15-25 min. win_deps.bat downloads
      # the prebuilt binaries (self-installs wget/7z via choco) into OpenCPN/cache/,
      # which is exactly what the plugin's OCPN_SRC_DIR discovery reads.
      - name: Checkout OpenCPN (prebuilt 32-bit wx + GLEW)
        uses: actions/checkout@v7
        with:
          repository: OpenCPN/OpenCPN
          path: OpenCPN
          fetch-depth: 1

      - name: Fetch Windows deps (OpenCPN prebuilt wx/GLEW)
        working-directory: OpenCPN/buildwin
        shell: cmd
        run: win_deps.bat

      - name: Configure
        # -A Win32 keeps the plugin 32-bit to match OpenCPN's Windows process.
        run: >
          cmake -S . -B build -A Win32
          -DOCPN_SRC_DIR="${{ github.workspace }}/OpenCPN"
          -DTILE57_DIR="${{ github.workspace }}/tile57"
          -DTILE57_LIB="${{ steps.t57lib.outputs.path }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Package (OpenCPN import tarball)
        run: cmake --build build --target package --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tile57_pi-windows
          path: build/tile57_pi_*.tar.gz
          if-no-files-found: error
